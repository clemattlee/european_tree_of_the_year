 style='width:260px;'><h3>🌳 Kneeling tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Klecici_strom_1_ff21179871.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Ash-leaved maple (Acer negundo L.)<br><b>Age:<\/b> 65 years years<br><b>Region:<\/b> Krasnystaw, Lubelskie province, Poland<br><b>Score:<\/b> 16856 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Guardian of Great Moravia's secrets<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Strazkyne_velkomoravskych_tajemstvi_1_6ead9bc26c.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> Large-leaved lime (Tilia platophyllos)<br><b>Age:<\/b> 235years years<br><b>Region:<\/b> Kopčany, Skalica district, Slovak republic<br><b>Score:<\/b> 15412 votes<\/p><p>On the edge of the village of Kopčany, in a quiet meadow, there is an old lime and an old church. They protect each other and have resisted the weather for more than two hundred years. The church is from the 9th - 10th century, and is one of the oldest buildings of the Great Moravian period of Slovakia. They create a typical sacred couple for our country - the lime with its roots protects the forgotten stories of the ancestors from the Great Moravian Empire and completes the unspoken atmosphere of this archaeologically and culturally significant place.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Nellie's Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Nelliin_strom_1_d586a7bcf6.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Beech (fagus sylvatica)<br><b>Age:<\/b> 100 years years<br><b>Region:<\/b> Leeds, Yorkshire, England, UK<br><b>Score:<\/b> 14408 votes<\/p><p>Nearly 100 years ago, Vic Stead would walk to the nearby village to visit Nellie, the young lady he was courting. One day, he came across three beech saplings on his route, and grafted one sapling between the other two to form the letter N, in an attempt to woo his sweetheart. Vic and Nellie would go on to marry and have a family, and although they are both gone now, Nellie’s tree, also known as the Love Tree, still remains. It is still popular with lovers today and is the site of proposals.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Our Lady Tree of Lummen<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Buk_Panny_Marie_v_Lummen_1_8d07e20087.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> European Beech (Fagus sylvatica)<br><b>Age:<\/b> Unknown years<br><b>Region:<\/b> Lummen, Province of Limburg, Belgium<br><b>Score:<\/b> 14295 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Gubec linden<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Gubcova_lipa_1_94514385bd.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> Large-leaved linden (Tilia platyphyllos)<br><b>Age:<\/b> around500 years<br><b>Region:<\/b> Gornja Stubica, Krapina-Zagorje County, Croatia<br><b>Score:<\/b> 14217 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Elm of Navajas<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Jilm_z_Navajas_1_d956244e22.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Elm (Ulmus minor)<br><b>Age:<\/b> 382 years years<br><b>Region:<\/b> Navajas,Castellón, Spain<br><b>Score:<\/b> 13622 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The towering plane from Câmpeni<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Obri_platan_z_Campeni_1_35a41db590.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2019<br hey were hearing the strong winds blowing over the valley. This pine tree is not only an important landmark but also an impressive testimony to its high resistance to climate change and human impact. Please do not approach the Chudobin pine tree and do not enter the protection zone of the Vír water reservoir. Illegal visits to a tree threaten the tree. If you want to keep it for future generations, stay away from it.<\/p><\/div>","<div style='width:260px;'><h3>🥈 Ginkgo from Daruvar<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Jinan_z_Daruvaru_1_46ed423ab8.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2020<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> Ginkgo (Ginkgo biloba)<br><b>Age:<\/b> 242 years years<br><b>Region:<\/b> Daruvar, County of Bjelovar-Bilogora, Republic of Croatia<br><b>Score:<\/b> 28060 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🥉 Lonely Poplar<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Osamely_topol_1_83299a423b.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2020<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> Laurel-Leafed Poplar (Populus laurifolia)<br><b>Age:<\/b> 103 years years<br><b>Region:<\/b> village Har-Buluk,Tselinny district, Kalmykia, Russia<br><b>Score:<\/b> 27411 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Witch Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Carodejny_strom_1_daa9b49ffa.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2020<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Beech (Fagus Sylvatica)<br><b>Age:<\/b> 130years years<br><b>Region:<\/b> Bladel, North Brabant, The Netherlands<br><b>Score:<\/b> 18452 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 NA<\/h3><img src='NA' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> NA<br><b>Place:<\/b> NA<br><b>Species:<\/b> NA<br><b>Age:<\/b> NA<br><b>Region >Species:<\/b> Apple tree (Malus domestica var. 'Reinette de Blenheim')<br><b>Age:<\/b> 70 years years<br><b>Region:<\/b> Machov, Náchod district<br><b>Score:<\/b> 32028 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Judas Tree on the Church Hill of Mélykút<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Judas_Tree_on_the_Church_Hill_of_Melykut_Hung_1_779f6d62f7.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> Judas Tree (Cercis siliquastrum L.)<br><b>Age:<\/b> 250 years years<br><b>Region:<\/b> Mélykút, Bács-Kiskun county, Hungary<br><b>Score:<\/b> 31867 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Pouplie<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Pouplie_1_33c505cb7e.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> Black poplar (Populus nigra L.)<br><b>Age:<\/b> 200-300 yrs years<br><b>Region:<\/b> Boult-sur-Suippe, Great East Region, France<br><b>Score:<\/b> 31594 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Eldest Resident of Medulin - Chocolate Tree of our Memories<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Eldest_Resident_of_Medulin_Chocolate_Tree_of_o_1_ae9de37d23.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> European Nettle Tree (Celtis australis L.)<br><b>Age:<\/b> 115 years years<br><b>Region:<\/b> Medulin, Istria County, Croatia<br><b>Score:<\/b> 31283 votes<\/p><p>Years fly by she tells us. The town square was always alive. With a market, dances, centuries-old traditions as Carnival Prince burning or ritual May thefts when young men show courage and love to girls by stealing flowers, fences, cars or boats from locals who find them under the town square tree. Today she enjoys a movie or play, sways at summer concerts, sings for Christmas when she dresses up to spend time with locals and guests. Above all she loves children's play and laughter, she'll treat them to magical chocolate berries in the future too. So she says, the eldest resident of Medulin, our town square Nettle Tree.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Survivor Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Survivor_Tree_1_b61e8bf398.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> Rowan (Sorbus aucuparia L.)<br><b>Age:<\/b> 70-100 years years<br><b>Region:<\/b> 9LH, A708, Moffat, Scotland, UK<br><b>Score:<\/b> 31197 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Four-Trunked Survivor<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Four_Trunked_Survivor_1_6e062e909c.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> Chestnut (Castanea sativa L.)<br><b>Age:<\/b> 160 years years<br><b>Region:<\/b> Ypres, Belgium<br><b>Score:<\/b> 30886 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Ancient Oak from Drnava<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Ancient_Oak_from_Drnava_1_639bc93a1d.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 13th place<br><b>Species:<\/b> Pedunculate oak (Quercus robur L.)<br><b>Age:<\/b> 700 years years<br><b>Region:<\/b> Drnava, Rožňava district, Slovakia<br><b>Score:<\/b> 30058 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Old Mulberry<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Old_Mulberry_1_59a133dcde.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2021<br><b>Place:<\/b> 14th place<br><b>Species:<\/b> Mulberry (Morus alba L.)<br><b>Age:<\/b> around450 years<br><b>Region:<\/b> Veliki Preslav, Shumen Region, Bulgaria<br><b>Score:<\/b> 30055 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🥇 Oak Dunin<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Oak_Dunin_1_2b000ea9f4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 1st place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Przybudki, Podlaskie Province, Poland<br><b>Score:<\/b> 179317 votes<\/p><p>The oak tree is growing at the edge of the Białowieża Primeval Forest, one of the most known lowland forests, not only in Poland but also in Europe. It has been particularly respected and admired by local people as well as tourists visiting this area of Poland, called the European Region of Wisent. It is an inspiration for many artists. It amazes in every season – during full vegetation but also when it is showing its leafless, mysteriously curved branches.<\/p><\/div>","<div style='width:260px;'><h3>🥈 Oak of Conxo's Banquet Forest<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Oak_of_Conxo_s_Banquet_Forest_1_b4988fbc92.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 250 years years<br><b>Region:<\/b> Santiago de Compostela, A Coruña, Spain<br><b>Score:<\/b> 168284 votes<\/p><p>This historic oak was born at the time of Enlightenment. He was a witness in 1856 of the Democratic Banquet of Conxo, a revolutionary act that vindicated the ideals of the new Europe: Liberty, Equality and Fraternity. It was defended by Rosalía de Castro in a pioneering ecological protest in Spain. And the forest that welcomes it, at the foot of the Portuguese Pilgrimage Trail, is today a whole botanical treasure chest, open to the public in 2018 (with a great popular festival) after remaining inaccessible for more than a century.<\/p><\/div>","<div style='width:260px;'><h3>🥉 The Big Cork Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Big_Cork_Oak_1_cf99847d51.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> Cork Oak (Quercus suber L.)<br><b>Age:<\/b> 250 years years<br><b>Region:<\/b> Vale do Pereiro, Arraiolos, Alentejo, Portugal<br><b>Score:<\/b> 70563 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Chestnut of the hundred horses<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Chestnut_of_the_hundred_horses_1_21e541ab96.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Sweet Chestnut (Castanea sativa L.)<br><b>Age:<\/b> 3000 years<br><b>Region:<\/b> Sant&apos;Alfio, Sicily, Italy<br><b>Score:<\/b> 46275 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Umbrella from High Tatras<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Umbrella_from_High_Tatras_1_afafed48c3.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Weeping European beech (Fagus Sylvatica Pendula)<br><b>Age:<\/b> 70 years<br><b>Region:<\/b> Starý Smokovec - High Tatras, Poprad district, Prešov region, Slovakia<br><b>Score:<\/b> 37872 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Kippford Leaning Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Kippford_Leaning_Tree_1_29608f0f12.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> Hawthorn (Crataegus monogyna L.)<br><b>Age:<\/b> 60 Years years<br><b>Region:<\/b> Kippford, Dalbeattie in Dumfries & Galloway, Scotland<br><b>Score:<\/b> 30761 votes<\/p><p>The tree on the coast of Dumfries & Galloway is a fine example of a mature hawthorn tree. While not spectacular in size, it cuts a striking presence as the only tree on the windswept cockle shell beach. The hawthorn has been enjoyed by three generations of one local Dalbeattie family. It’s been climbed on, battered by the winds and even bumped into by cars turning. Yet still it survives and stands strong and proud on the edge of the beach.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Singing Lime<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Singing_Lime_1_8e199c600c.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Large-leaved lime (Tilia platyphyllos L.)<br><b>Age:<\/b> 700 years years<br><b>Region:<\/b> Telecí, Pardubice region, Czech Republic<br><b>Score:<\/b> 28649 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Multisecular Sweet Chestnut of Audran Square<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Multisecular_Sweet_Chestnut_of_Audran_Square_1_9ce6ef3439.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> Sweet Chestnut (Castanea sativa L.)<br><b>Age:<\/b> 330years years<br><b>Region:<\/b> La Celle Saint-Cloud (Yvelines) in Île de France Region, France<br><b>Score:<\/b> 28119 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Age Grand Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Age_Grand_Oak_1_723638c590.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> English Oak (Quercus robur L.)<br><b>Age:<\/b> ~250 years<br><b>Region:<\/b> Medni, Vidrizu parish, Limbazu distict, Latvia<br><b>Score:<\/b> 27098 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The weeping sophoras of the Csokonai Theatre in Debrecen<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_weeping_sophoras_of_the_Csokonai_Theater_in_De_1_62d70efb60.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Hanging Japanese acacia (Styphnolobium (Sophora) japonicum 'Pendula')<br><b>Age:<\/b> 100 years<br><b>Region:<\/b> Debrecen, Hajdú-Bihar region, Hungary<br><b>Score:<\/b> 26347 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The giant sequoia from Slatina<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_giant_sequoia_from_Slatina_1_125ad5f770.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> Giant sequoia (Sequoiadendron giganteum (Lindl.) J.Buchh.)<br><b>Age:<\/b> approximately130 years<br><b>Region:<\/b> Slatina, Virovitica-Podravina County, Republic of Croatia<br><b>Score:<\/b> 26225 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Giant Sequoia of the Collège Notre Dame de Bonlieu<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Giant_Sequoia_of_the_College_Notre_Dame_de_Bon_1_b1c5f9beee.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> Giant sequoia (Sequiadendron giganteum (Lindl.) J.Buchh.)<br><b>Age:<\/b> Morethan200 years<br><b>Region:<\/b> Virton, Wallonia, Belgium<br><b>Score:<\/b> 25724 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The King's Pine<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Kings_Pine_1_d060d7bb36.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 13th place<br><b>Species:<\/b> Scots Pine (Pinus Sylvestris L.)<br><b>Age:<\/b> 380 years<br><b>Region:<\/b> Järvselja village, Kastre parrish, Tartu county, Estonia<br><b>Score:<\/b> 25346 votes<\/p><p>The majestic King's Pine grows in Järvselja, Southern Estonia. It sprouted at the same time that King Gustavus Adolphus II of Sweden founded the University of Tartu, about 380 years ago. Hundreds of Estonian biologists, foresters and students of other specialties, whose academic education has typically included internships in Järvselja research forests, recognize the tree well. It is a symbolic tree, the powerful sturdy trunk of which is a monument to Estonian forestry and nature education.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Grandpa Kolyo's tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Grandpa_Kolyo_s_tree_1_a4a26e4e7e.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 14th place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 350 years years<br><b>Region:<\/b> Studena village, Svilengrad Municipality, Haskovo Province, Bulgaria<br><b>Score:<\/b> 24431 votes<\/p><p>The oak is named after the owner of the field where it grows – Nikola Angelov, known as Grandpa Kolyo. After hard work he would rest under its thick shade. Legend has it that the tree was part of a dense forest, located where the village lies today. Because of the forest and the river, its first residents settled there and founded the village. They were Bulgarians, hiding from the Turkish forays. This old oak is a symbol of Studena and a pillar of the Bulgarian spirit and faith of its residents.<\/p><\/div>","<div style='width:260px;'><h3>🌳 I am Tilia<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_I_am_Tilia_1_a0bdffc93a.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 15th place<br><b>Species:<\/b> Large-leaved Lime (Tilia platyphyllos L.)<br><b>Age:<\/b> 150 years years<br><b>Region:<\/b> Maasniel, province of Limburg, The Netherlands<br><b>Score:<\/b> 24201 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Turgenev oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Turgenev_oak_1_5474ad0fc8.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2022<br><b>Place:<\/b> 16th place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 199 years<br><b>Region:<\/b> Museum - reserve I.S.Turgenev &quot;Spasskoe - Lutovinovo&quot;, Spasskoe - Lutovinovo selo (village), Mtsensk Rayon (District), Oryol (Region), Russian Federation<br><b>Score:<\/b> 0 votes<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🥇 Oak Fabrykant<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Poland_01_ETY_2023_credit_Jakub_Kubka_97a656cfdb.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 1st place<br><b>Species:<\/b> Common oak (Quercus robur L.)<br><b>Age:<\/b> 180 years<br><b>Region:<\/b> Łódź, Poland<br><b>Score:<\/b> 45718 votes<\/p><p>This is one of the most original trees in Poland, a symbol of longevity and wisdom. Its unique shape attracts visitors to the park Klepacz in Łódź. One of its branches is s-shaped and is over 20 m long. Its canopy reaches an impressive 33 m. In the spring we can admire sapphire meadows around the oak, full of glories of the snow and siberian squills enhancing the noble nature of the tree.<\/p><\/div>","<div style='width:260px;'><h3>🥈 Common Oak - Dragon Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Slovakia_05_ETY_23_credit_Martin_Babarik_8987bef900.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> Common oak (Quercus robur L.)<br><b>Age:<\/b> 700 years<br><b>Region:<\/b> Forest in the cadastre of Lozorno village, Malacky district, Bratislava region<br><b>Score:<\/b> 18198 votes<\/p><p>The tree resembles a sitting dragon. Although his bark is rough and scarred, everyone feels safe around him. Hidden in the forest, it has protected the locals for centuries - from the first settlers who helped build the nearby Pajštún Castle, through merchants and immigrants from Croatia. He also oversaw the construction of the forest railway, which has long outlived its usefulness. Logging is currently taking place in its vicinity. Hopefully, the Dragon Oak will be saved for future generations as well.<\/p><\/div>","<div style='width:260px;'><h3>🥉 Apple Tree Colony from Krolevets<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Ukraine_01_ETY_2023_credit_Shutterstock_185301135c.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> Apple tree (Malus domestica Borkh.)<br><b>Age:<\/b> 220 years<br><b>Region:<\/b> city of Krolevets, Sumy region, Ukraine<br><b>Score:<\/b> 14219 votes<\/p><p>The apple tree occupies an area of 0.1 hectares. It’s been a long time since it lost the main trunk, there are now 15 small trunks that have grown into the ground. The feature of the apple tree is the ability to root itself when one of the trunks dies. So far no one has succeeded in transplanting an apple tree to another. People say it heals, walks in the “garden” relieve fatigue and apples rejuvenate. The apple colony survived two World Wars, the Holodomor of 1932-33 and the Russian invasion of Ukraine in 2022.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Palermo Botanical Garden's Giant Ficus<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Italy_05_ETY_2023_credit_Giant_Trees_Foundation_8f5017c5ec.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Moreton Bay fig (Ficus macrophylla f. columnaris)<br><b>Age:<\/b> 173 years<br><b>Region:<\/b> Palermo, Sicilia, Itália<br><b>Score:<\/b> 10663 votes<\/p><p>Introduced in 1845, it is the progenitor of the great Italian Ficus trees. The trunk is formed of stems and aerial roots that have merged over time. It develops vertically but extends laterally with large branches supported by columnar aerial roots that turn into tabular roots on the ground. There are as many as 44 secondary stems (some with a circumference of over 3 metres) supporting 11 large branches with horizontal development and a canopy covering an area of almost 3,000 square metres.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Eucalyptus of Contige<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Portugal_02_ETY_2023_credit_Jsantos_1d480b931e.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Eucalyptus (Eucalyptus globullus Labill)<br><b>Age:<\/b> 144 years<br><b>Region:<\/b> Contige, Sátão, Viseu<br><b>Score:<\/b> 10281 votes<\/p><p>Described by the University of Aveiro as \"the largest classified tree in Portugal\", it is located on the old National Road (EN 229). Its planting dates back to 1878, when the Donárias road was opened. It may have belonged to the neighboring families Garcia de Mascarenhas, Rio de Moinhos and Xavier do Amaral Carvalho from the county, who married in the 19th century. The monumentality of the tree forced its care, so that the profile of the road gave it the bow it deserved.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Encina of San Roque<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Spain_01_ETY_2023_credit_Ayto_Colindres_de42a0e0dc.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> Spanish oak (Quercus ilex L.)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Colindres, Cantabria, Spain<br><b>Score:<\/b> 10174 votes<\/p><p>This holm oak has rooted its roots in the Monte de La Redonda de Colindres for 400 years, watching over the Camino Real that runs at its feet. For centuries, it was spared the massive clearing of the forest, promoted by shipyards, for shipbuilding. In 1778, it's represented on the plan of the Salt Route, as a main reference. His story is a story of resistance: he didn't succumb to adversity and was neither firewood nor coal nor galleon, but a protective tree of travelers and walkers.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Waverley Abbey Yew<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_United_Kingdom_01_ETY_2023_Aidan_Champion_9e8b53f866.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Yew (Taxus baccata L.)<br><b>Age:<\/b> 500 years<br><b>Region:<\/b> Farnham, Surrey, England<br><b>Score:<\/b> 9413 votes<\/p><p>The winner of UK Tree of the Year 2022 is a yew perching on the ruins of Waverley Abbey, in Surrey, founded 900 years ago by the reforming Cistercian religious order. After the abbey was dismantled in 1536 following the Dissolution of the Monasteries, the yew tree sprung up and has been a faithful guardian of the ruins for nearly 500 years. It is a spectacular tree with roots that sprawl out above ground before plunging into the earth. Its multi-stemmed form is dotted with holes, crevices and areas of decay that provide valuable habitat for wildlife.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Weeping Beech of Cassel Mount<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_France_01_ETY_2023_credit_Emmanuel_Boitier_3ad0f7d925.png' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> Weeping Beech (Fagus sylvatica f. pendula (Lodd. ex Loudon) Scheele))<br><b>Age:<\/b> 140 years<br><b>Region:<\/b> Cassel (French coastal Flanders), North department, Hauts-de-France region, France<br><b>Score:<\/b> 8867 votes<\/p><p>He culminates in the central hill of a public park, undulating his weeping branches cradled by the northern winds. His elegant giant silhouette has been growing in the sun for over 140 years, but he is not a loner. Nammed the Beech of encounters, a lime tree is his nearest friend and he has numerous visitors. Beloved by locals, witness of History, he inspires beautiful poems. People of Cassel obtained the prestigious Remarkable Tree of France label for him, and he won our hearts nationally.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Marquis’ Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Netherlands_01_ETY_2023_Rob_Huibers_4f236fd253.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 220 years<br><b>Region:<\/b> Utrecht, Province of Utrecht, the Netherlands<br><b>Score:<\/b> 8616 votes<\/p><p>It’s the classic dilemma of the modern age: nature vs. mobility. I am the patriarch of my forest, 30 metres tall, planted around 1800 by the marquis of the Amelisweerd estate. Many have enjoyed my presence since then. But how about the future? My existence is threatened by the expansion of highway A27, 800 other trees face the same fate. Many alternatives have been presented, all have been rejected, despite numerous protests. I consider myself a symbol of resistance against global tree felling, but how much longer do I have?<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Bridge Plane Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Hungary_07_ETY_2023_credit_Agnes_Komondi_2986d31f80.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Oriental Plane (Platanus Orientalis L.)<br><b>Age:<\/b> 230-250 years<br><b>Region:<\/b> Tata, Komárom-Esztergom county, Hungary<br><b>Score:<\/b> 7342 votes<\/p><p>This 230-250 year old sycamore tree can be found in the historical garden of Tata. It was still young when it fell over, due to the wet soil and other natural forces, so it has been growing on the ground, leaning over Lake Cseke for more than 200 years. Yet every spring, it turns green and brings happiness to the hearts of the visitors of the landscape garden. It is more than a tree, it is a sign, a symbol. A symbol of willpower and the will to live. A message: \"Never give up!\"<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Pear Tree in Drásov<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Czech_Rrepublic_01_ETY_2023_credit_Borivoj_Hajek_91fbe5f287.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> Common Pear (Pyrus communis L.)<br><b>Age:<\/b> 300 years<br><b>Region:<\/b> Municipality of Drásov, Central Bohemian Region, Czech Republic<br><b>Score:<\/b> 6664 votes<\/p><p>Near the municipality of Drásov stands a pear tree - it's beauty is known all around and its resilience is breathtaking. The tree is a true hero as it grows only 25 metres from the uranium mine that was opened at the end of the 1950s and the excavated tailings were deposited on a heap near the tree. Fortunately, the mining did not last long and the edge of the heap stopped only 20 metres from the tree. It is incredible that the pear tree withstood these hard times and the locals can still enjoy its beauty and juicy fruit.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Sēja Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Latvia_01_ETY_2022_credit_Ruta_Keviesena_515909d679.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 500 years<br><b>Region:<\/b> Sēja municipality, Saulkrasti district, Latvia<br><b>Score:<\/b> 6005 votes<\/p><p>The 500-year-old oak tree holds memories of the people who lived in Sēja Manor, of historical events, and of the strongest winds. Its roots run deep not only in our land, but also in people's hearts. Every year at the summer solstice, local people gather at the foot of the oak to make a flower ornament in its honour and celebrate the shortest summer night with songs. Is it a special magic that draws people to the Sēja Oak? No. Besides the grandeur of the oak, it possesses an unusual serenity that we all long for.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Purple Beech of Reigi<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Estonia_04_ETY_2023_credit_Ain_Naekk_fe660d3e8f.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 13th place<br><b>Species:<\/b> European Beech (Fagus sylvatica f. purpurea)<br><b>Age:<\/b> 120 years<br><b>Region:<\/b> Pihla, Hiiumaa, Estonia<br><b>Score:<\/b> 5875 votes<\/p><p>On a small and serene Estonian island, Hiiumaa, in the Baltic Sea, a rare red-leaved beech grows, a resilient exceptional finding in harsh Nordic conditions. 120 years ago, this tree was set in the garden of the pastorate of the Reigi Church by a pastor in honor of the birth of his son. Once upon a time it was a centre of community life; church bells rang and the tavern buzzed, providing content for several novels, films and even an opera. Nowadays, tranquility mixes with the vitality of the Reigi beech, waiting for guests.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Plane Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Bulgaria_ETY_2023_credit_Mariya_Stefanova_3bbbaa396e.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 14th place<br><b>Species:<\/b> Oriental plane (Platanus Orientalis L.)<br><b>Age:<\/b> 1054 years<br><b>Region:<\/b> Varna, Varna region, Bulgaria<br><b>Score:<\/b> 5814 votes<\/p><p>Thе tree is the oldest in Varna region.Its origin dates back to the period of the First Bulgarian Empire (7th-11th c.).Czech archaeologists and naturalists the Škorpil brothers,who made a significant contribution to the exploration of Bulgarian history and nature in the post-Ottoman period,mention it in their records.Its trunk has suffered fire damage,yet its crown turns beautifully green every spring.Legend has it that its energy heals all ailments.This makes it a favorite place for the locals.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Brown Cherry Pear of Klerken<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Belgium_01_ETY_2022_credit_Rudy_Debruyne_a232ab8651.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 15th place<br><b>Species:<\/b> Common Pear (Pyrus Communis L.)<br><b>Age:<\/b> 102 years<br><b>Region:<\/b> Klerken, West-Flanders, Belgium<br><b>Score:<\/b> 4823 votes<\/p><p>The tree has contributed to Klerken's cultural identity. For many years, this village organised a perelaarommegang, a procession around the fruit of the tree. After 20 years of standstill, this will be organised again in August 2023 by the vzw perenstoet klerken,the organisation that submitted the tree. Throughout history, the pears have been an important symbol for the village, so a street was also named after the tradition: the Perelaarommegang.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Oak from Drežnica Field<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Croatia_01_ETY_2023_credit_Ivona_Grgurinovic_93f3426f81.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2023<br><b>Place:<\/b> 16th place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 250 years<br><b>Region:<\/b> Drežnica field, Ogulin, Karlovac County<br><b>Score:<\/b> 4814 votes<\/p><p>This tree doesn’t have a name. It is one of the many ancient oak trees in the karst Drežnica field in Croatia. The 440 m altitude makes this forest special: in spring or fall, as if by magic the field becomes a lake and only the tips of the highest oaks, such as this one, remain visible. Thanks to its endemic species, the Drežnica field is part of Natura 2000 but the planned retention (under litigation) means longer cycles of flooding and danger for this tree, the forest and the whole ecosystem.<\/p><\/div>","<div style='width:260px;'><h3>🥇 The Heart of the Garden<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Poland_01_ETY_2024_credit_Bozka_Piotrowska_vel_Zielona_Bombonierka_3f1fff30b4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 1st place<br><b>Species:<\/b> Common beech (Fagus sylvatica) 'Atropunicea'<br><b>Age:<\/b> 200 years<br><b>Region:<\/b> Niemcza, Arboretum Wojsławice - Botanical Garden of the University of Wrocław, Lower Silesia, Poland<br><b>Score:<\/b> 39158 votes<\/p><p>This monumental tree grows in the centre of an old park. Its majestic appearance impresses us with its unusually shaped and thick trunk, widely spreaded branches, and purple-coloured leaves that shine beautifully in the sun. The \"Heart of the Garden\" is living proof of an old park’s historic turmoil and dominates over the Arboretum situated around it. Upon a shadow of its great, widely spreaded crown, enthusiasts still meet - just like 100 or 200 years ago - united by their admiration of nature.<\/p><\/div>","<div style='width:260px;'><h3>🥈 The Weeping Beech of Bayeux<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_FRANCE_03_ETY_2024_credit_Francois_Trinel_33be3a2d90.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> Weeping Beech (Fagus sylvatica f. pendula)<br><b>Age:<\/b> 160 years<br><b>Region:<\/b> Bayeux, department of Calvados, Normandy region, France<br><b>Score:<\/b> 24807 votes<\/p><p>The Beech of Bayeux is a rare French Natural Monument, becoming as famous as Bayeux Tapestry in Normandy. Popular for his immense weeping canopy and massive twisted branches probably related to Verzy’s fau, he is a perfect romantic spot for celebrations and weddings. Spreading over 40m width today, the city had to keep on perfecting an incredible supporting structure for the last 100 years! Ongoing care and love for the tree, also shown in emails he gets, are his best protection for the future.<\/p><\/div>","<div style='width:260px;'><h3>🥉 The Thousand-year-old Olive Tree of Luras<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Italy_01_ETY_2023_credit_Valerio_Atzori_Corpo_forestale_Sardegna_16c094aa77.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> Olea eropaea subsp. oleaster (Hoffmanns. & Link)<br><b>Age:<\/b> 3000-4000 years<br><b>Region:<\/b> Luras, Sardinia, Italy<br><b>Score:<\/b> 13933 votes<\/p><p>The thousand-year-old olive tree of Luras is a natural wonder that fascinates and amazes with its grandeur and beauty. Located in the small town of Luras, in Sardinia, this centuries-old tree is considered one of the oldest specimens of wild olive on the island. He is defined as the “Patriarch of nature” for the wisdom of his age, estimated to be between 3000 and 4000 years old. The tree has a robust and resistant structure, which testifies to its longevity, a true symbol of resilience and continuity.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Camellia<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Portugal_04_ETY_2024_credit_Jose_Couceiro_da_Costa_7cef6b0a7d.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Camellia (Camellia Japonica L.)<br><b>Age:<\/b> 300 years<br><b>Region:<\/b> Guimarães, Braga, Portugal<br><b>Score:<\/b> 13508 votes<\/p><p>Multisecular, located in Guimarães, within the centennial gardens of the ancient Villa Margaridi (X th century), integrated into a Historical Garden, exemplifying the art of Topiary, with high aesthetic and biological value, it stands out for centuries of careful shaping, that have resulted in a monumental creation of volumes, colors, and geometrical shapes. A magnificent example of the symbiosis between Nature and Human. It is listed as National Heritage since 2022 and was elected Tree of the Year, in Guimarães, in 2021.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Pear Tree in the Middle of a Field<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Czech_Republic_01_ETY_24_credit_Tom_Kalous_15d755af68.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Common Pear (Pyrus communis L.)<br><b>Age:<\/b> 110 years<br><b>Region:<\/b> Municipality of Mrákotín, Pardubice Region, Czech Republic<br><b>Score:<\/b> 10433 votes<\/p><p>The memorial pear tree is not very large, measuring about two metres around the trunk and eight metres in height. However, it is extremely resilient and brave. It survived collectivisation in the times of former Czechoslovakia, the consolidation of fields, the construction of land reclamation and unprofessional interventions in the surrounding landscape. Its unusual shape reflects the strong winds that most often blow from the west in this region, as well as its lonely location in the middle of a field.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Spanish Oak of La Vega<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_SPAIN_01_ETY_2024_Rosalia_Escalante_cfc4695ccf.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> Holm oak (Quercus ilex var. Rotundifolia)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Coripe, Andalucia, Spain<br><b>Score:<\/b> 9995 votes<\/p><p>“El Chaparro de la Vega” with around-400-years-old has a size extraordinary: over 12 meters tall, its trunk has a circumference of over 4 meters, the crown has a diameter of over 28 meters and the projection of its shadow is around 580 m2, where it holds the record for the largest number of people under its canopy, a total of 2000 people. It is in an exceptional state of preservation this is largely due to the people of Coripe, who have looked after it for generations. Every May, \"la Romería\" in honour of \"la Virgen de Fátima\" is held near the tree.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Maria Lime<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Netherlands_01_ETY_2024_credit_Rob_Visser_Photography_22a1581113.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Large-leaved lime (Tilia platyphyllos L.)<br><b>Age:<\/b> 650+ years<br><b>Region:<\/b> Oisterwijk, Province of Noord-Brabant, The Netherlands<br><b>Score:<\/b> 9976 votes<\/p><p>First officially mentioned in 1388, the Maria Lime tree in Oisterwijk, a.k.a. the Old Lime, is likely more than 650 years old. Her life is intertwined with many generations of inhabitants. Underneath her impressive crown, justice was served and town meetings were held. It was said she could shelter up a lot of people. The Maria Lime tree saw numerous markets, weddings and city festivities. During the 1800s, she nearly died, but formed a new trunk. Still loved by all.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Millennium Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Ukraine_06_ETY_2024_credit_Oksana_Marchyshyn_f8f7f3ec25.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> Common oak (Quercus robur L.)<br><b>Age:<\/b> 1000+ years<br><b>Region:<\/b> Veryn village, Stryi district, Lviv region, Ukraine<br><b>Score:<\/b> 8886 votes<\/p><p>«The Millennium Oak» — the oldest tree of the Lviv Region, which took root on the territory of the local church of Michael in the village of Veryn. In 1984, the old oak was given the status of a botanical monument. The tree has several hollows, one of which is so large that it resembles a cave. There is a legend that during the Second World War, a sniper sat in the hollow and prevented the crossing of the Dniester River from being established. In 1917, there was a school of Ukrainian Sich Riflemen in Veryn. The soldiers immortalized the old tree in a photo, which was later used as an image for a postcard.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Kaņepju Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Latvia_02_ETY_2023_credit_Vladimirs_Brjunins_e341dc51e9.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 450-800 years<br><b>Region:<\/b> Jērcēni, Valmiera municipality, Latvia<br><b>Score:<\/b> 8149 votes<\/p><p>Kaņepju oak — the second largest oak in Latvia and the Baltics — the pride and symbol of the local community, with people choosing to mark special moments under the oak's crown. The trunk of the oak was once split in half by lightning, leaving a large cavity in the middle of it. Various names and initials have been carved on it, the oldest dating back to 1886. In 1933, Atpūta, the most popular magazine in Latvia at the time, announced a competition for the mightiest oak. Kaņepju oak came first.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Wrexham's Acton Park Sweet Chestnut<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_UK_01_ETY_24_credit_Hannah_Farnell_cb1026f7a5.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Sweet Chestnut (Castanea sativa)<br><b>Age:<\/b> 500+ years<br><b>Region:<\/b> Wrexham, Wales, United Kingdom<br><b>Score:<\/b> 7180 votes<\/p><p>The national contest celebrated urban trees in our neighbourhoods, each one a locally-loved ancient or veteran tree with a fascinating story and incredible benefits for wildlife, communities and the environment. Wrexham's sweet chestnut won with an impressive 17% of the vote. Thought to be almost 500 years old, this giant tree is a symbol of resilience in the city, having weathered challenges from post-war plundering of the park for firewood in the forties to dozens of deadly storms. The tree is celebrated and loved by locals for its beauty and history, and often the centrepiece for picnics and tree parties.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Lithuania’s Patriarch Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Lithuania_01_ETY_2024_credit_Leonardas_Skirpstas_162f039c97.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> Horse chestnut (Aesculus hippocastanum L.)<br><b>Age:<\/b> 200 years<br><b>Region:<\/b> Ožkabaliai I Village, Vilkaviškis District Municipality, Lithuania<br><b>Score:<\/b> 6656 votes<\/p><p>The horse chestnut growing in the homestead of Jonas Basanavičius, known as the Patriarch of the Nation, is the only authentic object surviving World War II reminiscent of his lifetime. In the past people used to gather under its branches to express their national beliefs and patriotism, even if it was punishable in the occupied country. They used to decorate the branches of the tree by national flags and woven bands. Today, museum visitors lean against it to experience the Patriarch’s spirit.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Viiralt's Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Estonia_01_ETY_2024_credit_Ain_Nakk_57b368af1a.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> English oak (Quercus robur L.)<br><b>Age:<\/b> 300-400 years<br><b>Region:<\/b> Vana-Võidu village, Viljandi county, Estonia<br><b>Score:<\/b> 5703 votes<\/p><p>Viiralt's Oak, named after well-known Estonian graphic artist Eduard Viiralt's 1943 engraving, stands proudly in Estonia's Viljandi area. This 13-meter-tall tree, also known as Tamme-Koori tamm, holds historical intrigue. Legend has it that the King of Sweden personally planted it from a broken log, promising a return of Swedish power to Estonia. Despite landscape changes, the oak remains robust, with a 550 cm circumference. Commemorated on a silver coin for Estonia's 90th anniversary, this iconic tree embodies cultural and historical significance. A must-see for art enthusiasts and those exploring Estonia's rich heritage.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Green Lady of the Krka National Park<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Croatia_01_ETY_24_credit_Tomislav_Rupic_38dab6a593.jpeg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 13th place<br><b>Species:<\/b> White mulberry (Morus alba L.)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Krka National Park<br><b>Score:<\/b> 5690 votes<\/p><p>It is not known who planted the mulberry tree that has been standing for generations on the right bank of the river under the remains of the Budim mill, but it is a symbol of the silken past and sweet present of this region. It is estimated that the white mulberry tree is about 400 years old and has a trunk circumference of 475 cm. It is part of our tradition and a recognizable image of our landscape. Trees, as a manifestation of life itself, have always been strongly connected with man. This is how our old mulberry tree today provides shade and shelter to new generations.<\/p><\/div>","<div style='width:260px;'><h3>🌳 An Oak That Remembers the Pálffy Family<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Slovakia_02_ETY_2023_credit_Martin_Babarik_5fcf07f169.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 14th place<br><b>Species:<\/b> Common oak (Quercus robur L.)<br><b>Age:<\/b> 500+ years<br><b>Region:<\/b> Malacky, Malacky district, Bratislava region<br><b>Score:<\/b> 5204 votes<\/p><p>The Pálffy oak is one of the last trees that began to write its story before the arrival of the Pálffy family in Malacky. All you have to do is slow down and the old tree will tell you stories about noble family, wars, old loves, epidemics, fires and markets. It is one of the oldest specimens located in the grounds of the National Cultural Monument Castle Park, and it, along with trees located in the immediate vicinity of the manor, make up the composition of the park which forms a wild forest.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Cedar of the Sainte-Marie college<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Belgium_06_ETY_2024_credit_Thomas_MEUNIER_b29d485265.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2024<br><b>Place:<\/b> 15th place<br><b>Species:<\/b> Cedar (Cedrus atlatica)<br><b>Age:<\/b> 140 years<br><b>Region:<\/b> Arlon, wallonia, Belgium<br><b>Score:<\/b> 4834 votes<\/p><p>Anyone who has passed by this school or enters the city will be familiar with this majestic tree. It shapes the landscape and creates a reassuring link between nature and the city. A cedar here? Sometimes considered the sacred tree of the gods, sometimes a symbol of fertility, peace and harmony. A remarkable symbol chosen by the Marists! Today, with a height of 28 m., a spread of 27 m and a trunk with a circumference of 470 cm, it is one of the largest cedars in Belgium. This cedar, the emblem of the school, is one of the most beautiful trees in our Region.<\/p><\/div>","<div style='width:260px;'><h3>🥇 Heart of the Dalkowskie Hills<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Poland_01_ETY_2025_credit_Marcin_Kopij_2048px_526df27d5c.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 1st place<br><b>Species:<\/b> Common beech (Fagus sylvatica) 'Atropunicea'<br><b>Age:<\/b> 300 years<br><b>Region:<\/b> Dalków, Gaworzyce commune, Lower Silesia, Poland<br><b>Score:<\/b> 147553 votes<\/p><p>The beech tree grows in a historic park. It is called \"Heart\" for 3 reasons: growing in the central part of the Dalkowskie Hills, with its red-coloured leaves resembling the color of a heart, it gathers people under its branches. Concerts, reading clubs and Catholic Masses were held here. Over 5,000 people have taken part in horticultural and sylvotherapy workshops here. Tourists think of wishes and throw peanuts into the hole in the tree, believing that the tree makes dreams come true.<\/p><\/div>","<div style='width:260px;'><h3>🥈 The Lovers Banyan Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Portugal_01_ETY_2025_credit_Ana_Rute_2048px_49f7700be4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> Moreton Bay Fig (Ficus macrophylla)<br><b>Age:<\/b> 150 years<br><b>Region:<\/b> Santa Clara, Coimbra, Portugal<br><b>Score:<\/b> 43427 votes<\/p><p>This majestic evergreen tree is located in the Quinta das Lágrimas Gardens next to the Fountain of Lovers, the scene of the secret love between King Pedro of Portugal and Inês de Castro. It was planted in the 19th century by an aristocratic tree collector as the result of seed exchanges with the Sydney Botanical Garden. Today, it is an attraction to this place of worship for lovers and admired by thousands of visitors, who are fascinated by the size and beauty of its branches, huge trunk and buttress roots.<\/p><\/div>","<div style='width:260px;'><h3>🥉 Pino de Juan Molinera<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Spain_01_ETY_2025_credit_Andres_Gonzalez_2048px_e6be2a6e8a.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> Stone Pine (Pinus pinea)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Abengibre, Province of Albacete, Spain<br><b>Score:<\/b> 36873 votes<\/p><p>Planted almost 400 years ago to give shelter and rest to the day laborers of the surrounding orchards, the Pino de Juan Molinera keeps the history and memories of more than a dozen generations of Agengibre's people: children's games, snacks, popular celebrations, confidences sharing their sweet pine nuts and, of course, beautiful love stories were also born under its protection. As symbols of its strength, it proudly displays the harsh tests to which time has subjected it. It has survived devastating floods, major snowstorms and was even struck by lightning in the middle of the last century.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Lukavice Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Czech_Republic_ETY_2025_01_credit_Lucie_Mojzisova_09d6668bf4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 700-800 years<br><b>Region:<\/b> Lukavice, Pardubice Region, Czech Republic<br><b>Score:<\/b> 35650 votes<\/p><p>The period before World War I was not kind to this nearly 700-year-old elder. The management of the estate, on whose land the oak had taken root, made persistent efforts to destroy it. They chose a truly unusual method: removing cartloads of soil from around its roots, which was done despite a prohibition from the authorities at the time.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Wild Pear from Bošáca<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Slovakia_01_ETY_2025_Martin_Babarik_2048px_8fb47c75ee.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Plane Pear (Pyrus Pyraster)<br><b>Age:<\/b> 150 years<br><b>Region:<\/b> Bošáca, Nové Mesto nad Váhom District, Region Trenčín, Slovakia<br><b>Score:<\/b> 23729 votes<\/p><p>A stray seed, carried away by the wind from under a nearby pear tree, took root on the sunny Lysica Hill, which rises above Bošáca village. Bošáca is an exceptional place with a rich fruit-growing tradition, where massive pear seedlings are an integral part of the White Carpathian landscape. The pear tree is an important landmark because the vicinity of the tree is a sought-after place for its weather conditions for fans of paragliding - every year there is a competition in flying historical model airplanes.<\/p><\/div>","<div style='width:260px;'><h3>🌳 White Acacia<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Ukraine_01_ETY_2025_credit_Ruslana_Vasyliuk_2048px_6a99072376.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> White acacia (Robinia pseudoacacia)<br><b>Age:<\/b> Morethan years<br><b>Region:<\/b> Ivano-Frankivsk, Ukraine<br><b>Score:<\/b> 16986 votes<\/p><p>White acacia, over 140 years old and known as the «Witness of Seven Generations» is a rarity for its species. The tree has been part of 6 states (Austria-Hungary, WUPR, Second Polish-Lithuanian Commonwealth, Germany, Ukrainian SSR and Ukraine), standing as a living witness to history.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Skipinnish Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_UK_01_ETY_2025_Jillian_Donnachie_a9f7be6696.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Lochaber, Scotland, United Kingdom<br><b>Score:<\/b> 16771 votes<\/p><p>The Skipinnish Oak in Scotland was crowned UK winner. This magnificent 400-year-old tree stands tall in an airy clearing amid a dark spruce plantation in the heart of Lochaber, Scotland. Impressive in stature and history, it's one of the largest oaks in the region and a local treasure, partially named after the renowned Scottish Celtic band. This amazing tree is also a crucial part of the ecosystem and hosts diverse lichens including the rare black-eyed Susan, which is seldom found outside the west of Scotland.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Mēru Grand Oak<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Latvia_02_ETY_2025_credit_Maris_Eglite_2048px_c432ffa6cf.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 200 years<br><b>Region:<\/b> Mēri, Bilska parish, Smiltene municipality<br><b>Score:<\/b> 13088 votes<\/p><p>A strong guardian of the region, a witness of history, and a bearer of blessings. The Mēru Grand Oak was probably mentioned in a quote of an old story: “After the Northern War, the plague raged around, killing all living creatures, except two people who survived, climbing up an oak”. Mēru Grand Oak is considered to have the largest canopy in the Baltics. As per the latest measurement taken in 2024, the crown projection is 16.6 m northwards, 17 m southwards, 22.2 m eastwards, 16.8 m westwards. The crown's diameter spans 39 m east-west and 33.6 m north-south. The crown projection area is 0.1 ha.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Tree of Freedom in Rab<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Croatia_01_ETY_2025_credit_David_Kabalin_2023_71b8bcc51f.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 9th place<br><b>Species:<\/b> Holm Oak (Quercus Ilex)<br><b>Age:<\/b> 105 years<br><b>Region:<\/b> Rab, Croatia<br><b>Score:<\/b> 12807 votes<\/p><p>The Tree of Freedom in Rab is a holm oak (quercus ilex), which is a characteristic species for the island of Rab. Generations of Rab residents have grown up with this tree, and it occupies a central place in their personal and collective memories. Many families have preserved oral traditions about an ancestor who participated in the planting. Four years ago, a grand celebration marked the centennial anniversary of the planting of the holm oak, which filled and protected the entire square with its crown.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Oak of Varniškės<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Lithuania_01_ETY_2025_credit_Giedre_Svikle_2048px_c30dcee036.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 200+ years<br><b>Region:<\/b> Varniškės village, Vilnius district municipality, Lithuania<br><b>Score:<\/b> 11909 votes<\/p><p>The Oak of Varniškės is a symbol of strength, love, and Lithuanian tradition. Once, a Lithuanian family discovered this magnificent tree, left the city, and built a home and herb farm near it. The oak became the heart of their lives and the eldest member of the family. Under its branches, they celebrated traditions and remembered ancestors. This oak is not just a tree; it inspires, heals, and unites. It is a guardian of the past and a guide for the future – a living legend of Lithuania. Symbolically, this hero thrives only 1,5 km away from the geographical center of Europe!<\/p><\/div>","<div style='width:260px;'><h3>🌳 Tasso di Matari - Urzulei<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Italy_01_ETY_2025_credit_Sardinia_Region_Forestry_Corps_2048px_46ebfa4ac1.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> English yew (Taxus baccata L.)<br><b>Age:<\/b> morethan years<br><b>Region:<\/b> Supramonte di Urzulei, Province of Nuoro, Sardinia ,Italy<br><b>Score:<\/b> 11845 votes<\/p><p>In a beautiful ilex forest in the middle of the limestone massif of Supramonte, a majestic yew tree grows, which has been watching over the remains of an extensive Nuragic village for hundreds of years. We are in the territory of the municipality of Urzulei, specifically in the locality of Matari. The Matari yew is one of the most impressive specimens of its species. It retains engravings on its trunk and branches, showing all the signs of the passage of time and the history it has witnessed.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Ginkgo Biloba<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_The_Netherlands_01_ETY_2025_credit_Rob_Visser_Photography_4a4250dfc7.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> Ginkgo (Ginkgo Biloba)<br><b>Age:<\/b> 240 years<br><b>Region:<\/b> Leiden, Zuid-Holland, The Netherlands<br><b>Score:<\/b> 9834 votes<\/p><p>In the Hortus Botanicus of Leiden stands the golden pearl of the Netherlands: the Ginkgo biloba. This Japanese Walnut tree, planted in 1785, is the second oldest specimen in Europe. The species itself is the oldest on our planet, having seen the dinosaurs walking, and survived through worship near Chinese monasteries because of its symbolic value of love and hope. The 22-meter-tall tree is a hermaphroditic, recognizable by its witches broom and beautiful autumn colours, making it a jewel to visit.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Peaceful Oak of Saint-Maurice<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_France_01_ETY_2025_credit_Emmanuel_Boitier_Terre_Sauvage_ed35bdee33.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 13th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 200-250 years<br><b>Region:<\/b> Clohars-Carnoët, Finistère, Brittany, France<br><b>Score:<\/b> 7303 votes<\/p><p>Standing by river Laïta in Brittany for over two centuries, this oak is a striking element of a wild, peaceful landscape at the entrance of the Abbey of Saint-Maurice, in the coastal city of Clohars-Carnoët. Popular among local people and beloved by visitors, it invites introspection. A treasure for local wildlife, it hosts epiphytic plants and attracts various animals. A bench aside has even been sculpted in the shape of an otter, as the cute animal is known to be a regular companion of the tree!<\/p><\/div>","<div style='width:260px;'><h3>🌳 Plane Tree in the Archbishop's Garden<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Hungary_01_ETY_2024_credit_Erika_Kovacs_2048px_ca240bfcb4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 14th place<br><b>Species:<\/b> London plane tree (Platanus acerifolia)<br><b>Age:<\/b> unknown years<br><b>Region:<\/b> Eger city, Heves region, Hungary<br><b>Score:<\/b> 7115 votes<\/p><p>The tree's appearance and size make it a prestigious, central feature of the garden. According to unwritten Eger tradition, before the Battle of the Kápolna in 1849, a council of war was held in Eger with Henrik Dembinszky, Artur Görgey, György Klapka and Lajos Kossuth, who rested under the shady foliage. The tree was declared protected in 1978, and in 1994 the entire Érsekkert was declared a local protected area. It is a popular tree, visited by many people.<\/p><\/div>","<div style='width:260px;'><h3>🌳 The Old Chestnut of Sint-Rafaël<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Belgium_01_ETY_2024_credit_Rudi_Debruyne_2048px_b8690f3eeb.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2025<br><b>Place:<\/b> 15th place<br><b>Species:<\/b> Sweet Chestnut (Castanea sativa)<br><b>Age:<\/b> 150-200 years<br><b>Region:<\/b> Sint-Job-in-'t-Goor, Antwerp, Flanders, Belgium<br><b>Score:<\/b> 6373 votes<\/p><p>The chestnut tree at Campus Sint-Rafaël, estimated to be 150-200 years old, stands at the heart of the grounds of the Orthopedagogical Center Clara Fey. It has witnessed the rich history of Sint-Job-in-'t-Goor, where Mathilde De Caters founded a convent and girls' school in 1868. Later, Baron Pierre de Caters, a pioneer pilot, established an airport in the village. Today, the tree remains a symbol of the care and history that have shaped the village throughout the years.<\/p><\/div>","<div style='width:260px;'><h3>🥇 Oak of Laukiai<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Lithuania_06_ETY_2026_credit_Vytautas_Zelnys_93cac1fd65.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 1st place<br><b>Species:<\/b> Common oak (Quercus robur L.)<br><b>Age:<\/b> 400 years<br><b>Region:<\/b> Rukai village, Skuodas district, Klaipėda County, Lithuania<br><b>Score:<\/b> 6153.00 tree points<\/p><p>The Oak of Laukiai once stood almost forgotten, known only to the people of the small Rukai village. But a year ago, the community restored its surroundings and organised a celebration in its honour — a beautiful initiative that brought many good people together and reminded everyone of its quiet strength. Today, with respect, warmth, and love, the sixth generation of Laukiai is growing alongside this Oak, grateful for its shade, its silence, and its steady presence through the years.<\/p><\/div>","<div style='width:260px;'><h3>🥈 Old Wild Apple Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Slovakia_01_ETY_2026_credit_Martin_Babarik_01ae052512.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 2nd place<br><b>Species:<\/b> Wild Apple Tree (Malus sylvestris)<br><b>Age:<\/b> 150 years<br><b>Region:<\/b> Žiar, Liptovský Mikuláš District, Žilina Region, Slovakia<br><b>Score:<\/b> 4766.00 tree points<\/p><p>At the very end of the field, meticulously cultivated by generations of villagers, grows an apple tree – an inconspicuous but remarkable one. For more than 150 years it has defied wind, rain, snowstorms, and heat waves in difficult conditions at an altitude of 860 meters. Quietly, from a place called Diel, it watches over the village below – a silent observer of its joys, troubles and changes. This is a place, where you suddenly feel like you're part of something bigger.<\/p><\/div>","<div style='width:260px;'><h3>🥉 Crooked Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Poland_05_ETY_2026_credit_Piotr_Piasta_8b2a9b0045.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 3rd place<br><b>Species:<\/b> White elm (Ulmus laevis)<br><b>Age:<\/b> 110 years<br><b>Region:<\/b> Szydłowiec, Masovian Voivodeship, Poland<br><b>Score:<\/b> 4720.00 tree points<\/p><p>The Crooked Tree rises above the moat on an island near the former castle of the Szydłowiecki and Radziwiłł families. Its unusual shape comes from its location, forcing it to lean toward the water. For years it was a silent witness to friendly meetings and youthful romances. Its trunk served as a natural bench for children and teenagers. Today, only ducks rest quietly on its trunk, and nature has taken over from people.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Linden of Sacrifice<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Latvia_05_ETY_2026_credit_Dainis_Karkluvalks_05a66a7ea3.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 4th place<br><b>Species:<\/b> Linden (Tilia cordata)<br><b>Age:<\/b> 400–500 years<br><b>Region:<\/b> Valdemārpils, Talsi municipality, Latvia<br><b>Score:<\/b> 4653.00 tree points<\/p><p>For generations, the linden of Valdemārpils has been the thickest linden tree in the Baltics. Legends tell it has served as an ancient cult tree for centuries; its estimated age is 400–500 years. The linden’s mighty branches bend to the ground as well as rise to the sky, creating a sanctuary or art gallery filled small sculptures and knick-knacks. Being inside, you may grasp the tree's centuries-old vitality, with cracks in the wood appearing like mythical spirits from ancient fairy tales.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Kostrena Oak Tree<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Croatia_01_ETY_2026_credit_Davor_Dragicevic_4b9115a7b4.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 5th place<br><b>Species:<\/b> Oak tree (Quercus pubescens)<br><b>Age:<\/b> 250 years<br><b>Region:<\/b> Kostrena, Kvarner region, Croatia<br><b>Score:<\/b> 3252.00 tree points<\/p><p>The Kostrena oak tree watches over Kvarner bay whispering the tale of its 250 years – of rulers and people long gone, generations of sailors and families written in its core. This proud guardian still keeps vigil by the school doors, its crown shielding all, awaiting generations to come.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Cedro de Runa<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Portugal_01_ETY_2026_Camara_Municipal_de_Torres_Vedras_aba382a333.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 6th place<br><b>Species:<\/b> Mexican Cypress (Hesperocyparis lusitanica)<br><b>Age:<\/b> 75 years<br><b>Region:<\/b> Runa, Lisboa/Torres Vedras, Portugal<br><b>Score:<\/b> 3058.00 tree points<\/p><p>Planted in the early 1950s by Mr. Alfredo, the Cedar Tree of the Church of Runa, now about 75 years old, is an essential part of local history and identity. Initially fragile, it was carefully protected by its planter, surviving against all odds. It has witnessed departures, returns, celebrations and silences, becoming a meeting point for all the people of Runa. Today, it deserves to be recognised as a symbol of the village of Runa and the municipality of Torres Vedras.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Oak of Prince Ulrich<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Czech_Republic_01_ETY_2026_credit_Tomas_Kalous_60c779858f.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 7th place<br><b>Species:<\/b> Common Oak (Quercus robur L.)<br><b>Age:<\/b> 1000 years<br><b>Region:<\/b> Peruc, Ústí nad Labem, Czechia<br><b>Score:<\/b> 2325.00 tree points<\/p><p>This oak is among the oldest trees in the Czech Republic, said to be 1,000 years old. Now a protected heritage tree, it has survived two separate fires, in 1993 and 1995 and continues to watch over the children of the nearby forest kindergarten. According to legend, Prince Ulrich once rode through these woods and saw a young peasant woman, Božena, washing clothes by a stream beneath the oak. He fell in love at first sight and later married her, making her a princess.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Tree of Memories<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Hungary_01_ETY_2026_Bagyinszki_Zoltan_da0da05fd3.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 8th place<br><b>Species:<\/b> London plane tree (Platanus × acerifolia)<br><b>Age:<\/b> 170 years<br><b>Region:<\/b> Békéscsaba-Gerla, Békés County, Hungary<br><b>Score:<\/b> 1348.00 tree points<\/p><p>For more than 150 years, I have guarded the stories of the Gerla manor. In my shade a count once told tales to his grandchild; children played, loves were born, dreams took shape. I have watched generations grow, heard laughter and silence, and the whisper of changing times. Today I still stand here — the great plane tree of Gerla — the Tree of Memories, a living link between past and present. Stand beside me, and you will feel all that I have preserved through the centuries. Vote for me!<\/p><\/div>","<div style='width:260px;'><h3>🌳 NA<\/h3><img src='NA' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> NA<br><b>Place:<\/b> NA<br><b>Species:<\/b> NA<br><b>Age:<\/b> NA<br><b>Region:<\/b> NA<br><b>Score:<\/b> NA<\/p><p>NA<\/p><\/div>","<div style='width:260px;'><h3>🌳 Ledeboerpark Giant Sequoia<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Netherlands_01_ETY_2026_credit_Rob_Visser_Photography_9d08f8435e.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 10th place<br><b>Species:<\/b> Giant Sequoia (Sequoiadendron giganteum)<br><b>Age:<\/b> 160 years<br><b>Region:<\/b> Enschede, Overijssel, Netherlands<br><b>Score:<\/b> 735.00 tree points<\/p><p>The oldest Sequoiadendron giganteum in the Netherlands is presently the giant sequoia in Abraham Ledeboerpark in Enschede. The enormous conifer connects the city's industrial past and present. During the ice ages, the giant sequoias disappeared from the landscape and were reintroduced to north-western Europe in the mid-nineteenth century as a symbol of wealth and power. A hundred years after being planted by wealthy manufacturers, people of all ages cherish the remarkable tree.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Sophora from Prymorsky park<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_2_4f4a877628.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 11th place<br><b>Species:<\/b> Japanese sophora (Styphnolobium japonicum)<br><b>Age:<\/b> 60+ years<br><b>Region:<\/b> Chornomorsk, Odesa region, Ukraine<br><b>Score:<\/b> 594.00 tree points<\/p><p>Japanese sophora, a living legend of Chornomorsk, is a symbol of resilience and power of life. It not only provides oxygen - it gives a sense of home, stability and connection between generations. Every leaf on this tree is a memory - a piece of the city's history that lives in the heart of community. In its honor, the city has launched an initiative to plant 99 young sophora trees so that its life will continue in new trees, parks and memories with a long and wonderful future.<\/p><\/div>","<div style='width:260px;'><h3>🌳 Argyle Street Ash<\/h3><img src='https://cdn.treeoftheyear.org/ety-fe/uploads/small_Argyle_Ash_8_must_credit_George_Anderson_Woodland_Trust_0844d3aeb6.jpg' style='width:100%; height:auto; margin-bottom:8px;'><p><b>Year:<\/b> 2026<br><b>Place:<\/b> 12th place<br><b>Species:<\/b> Common Ash (Fraxinus excelsior)<br><b>Age:<\/b> 175 years<br><b>Region:<\/b> Glasgow, Scotland, United Kingdom<br><b>Score:<\/b> 536.00 tree points<\/p><p>Rising unexpectedly from the heart of a dense city street, Glasgow’s Argyle Street ash is around 170 years old and 25 metres tall. It has endured industrialisation, wartime bombing, urban redevelopment and now ash dieback disease - yet it continues to live.<\/p><\/div>"],null,null,{"interactive":false,"permanent":false,"direction":"auto","opacity":1,"offset":[0,0],"textsize":"10px","textOnly":false,"className":"","sticky":true},null]},{"method":"addMarkers","args":[[46.34919166666667,41.59794166666667,46.43458055555555,49.24569166666667,49.63960833333334,46.57741666666667,46.05074999999999,43.62996944444445,49.15416944444444,51.55258055555555,49.518125,42.04088888888889,47.89735833333333,49.84608055555556,53.26663888888889,49.37802777777778,48.15571944444444,42.66244166666667,42.68055833333333,47.59511388888889,54.12952777777778,48.70255555555555,50.93891666666666,48.61713888888889,56.55792777777778,53.09430555555556,52.93146944444445,42.37835833333333,58.559,47.6477,40.5908,51.0567,49.6102,53.2047,43.8095,48.6796,56.5759,52.7624,50.7567,42.2997,42.18389999999999,53.0251,46.17011111111111,50.56819444444445,48.86819166666667,51.2585,41.93132777777777,44.12165833333334,57.91721944444444,52.27813333333333,50.58396388888889,55.87104444444444,52.99329722222222,48.77333055555555,54.61,51.84161666666667,52.79863055555555,49.86,52.51249722222222,49.79596666666666,14.83088888888889,55.00348888888889,42.82535833333333,55.95400833333333,49.23616666666667,40.35350833333334,59.44281944444444,50.98100833333334,55.82969166666667,47.514,52.01808055555556,53.03510555555555,38.58889166666667,38.70583055555556,50.53336111111111,46.18088888888889,51.65031666666667,48.86880555555555,42.71405555555556,42.25158055555555,49.24490833333333,55.10308333333334,54.6039,50.33406666666667,47.70471944444445,46.08346388888889,56.23334722222222,37.73671666666667,42.0363,50.98383055555555,48.79620555555555,53.80993888888889,50.98714722222223,45.97337222222222,39.877825,46.3628,42.81777777777778,55.096725,49.57209166666667,45.59541944444445,46.2805,51
